name: Deploy to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Create / configure S3 bucket
        run: node scripts/create-s3-bucket.mjs

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://$S3_BUCKET_NAME \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          # index.html should never be cached by browsers
          aws s3 cp dist/index.html s3://$S3_BUCKET_NAME/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Print website URL
        run: |
          if [ "$AWS_REGION" = "us-east-1" ]; then
            echo "URL: http://$S3_BUCKET_NAME.s3-website-us-east-1.amazonaws.com"
          else
            echo "URL: http://$S3_BUCKET_NAME.s3-website.$AWS_REGION.amazonaws.com"
          fi
